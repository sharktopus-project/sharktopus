name: Build and publish container images

# Builds the two container images (wgrib2 + crop handler) that the
# sharktopus cloud deployments pull from, and publishes them to the
# public GitHub Container Registry.
#
# Tags published (per variant):
#   - :{variant}-latest            (on push to main)
#   - :{variant}-sha-<short>       (on push to main)
#   - :{variant}-<ref>             (on git tag v*, e.g. v0.1.0)
#   - :{variant}-{major}.{minor}   (on git tag v*, e.g. 0.1)
#
# Where {variant} is one of:
#   - ``lambda``   (deploy/aws/Dockerfile    → AWS Lambda via ECR PTC)
#   - ``cloudrun`` (deploy/gcloud/Dockerfile → GCloud Cloud Run)
#   - ``azure``    (deploy/azure/Dockerfile  → Azure Container Apps)
#
# End users never build these themselves. `provision.py` just points
# their cloud account at the right GHCR tag.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sharktopus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: lambda
            context: deploy/aws
            dockerfile: deploy/aws/Dockerfile
          - variant: cloudrun
            context: deploy/gcloud
            dockerfile: deploy/gcloud/Dockerfile
          - variant: azure
            context: deploy/azure
            dockerfile: deploy/azure/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            prefix=${{ matrix.variant }}-,onlatest=true
          tags: |
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=${{ matrix.variant }}-sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
