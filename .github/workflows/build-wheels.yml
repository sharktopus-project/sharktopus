name: Build wheels

# Builds platform-specific sharktopus wheels with wgrib2 bundled inside.
# Triggered on version tags (v*) and manually. Wheels are uploaded as
# workflow artifacts. Production PyPI publish is still a follow-up,
# manual step. Release-candidate tags (v*rc*) are auto-published to
# TestPyPI so test users can `pip install --pre sharktopus` against the
# staging index without burning a production version slot.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux-x86_64:
    name: Linux x86_64 (manylinux_2_28)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gfortran
        # manylinux_2_28 ships gcc but not gfortran; wgrib2's Fortran
        # sources need it. dnf is the image's package manager.
        run: dnf install -y gcc-gfortran

      - name: Put CPython 3.12 on PATH
        # Manylinux images keep each CPython under /opt/python/<tag>/bin.
        # We only need one to run `python -m build`; the resulting wheel
        # is tagged py3-none-<plat> so every supported minor can install it.
        run: echo "/opt/python/cp312-cp312/bin" >> "$GITHUB_PATH"

      - name: Install build tooling
        run: pip install --upgrade pip build auditwheel

      - name: Compile wgrib2
        run: scripts/build_wgrib2.sh /tmp/wgrib2

      - name: Bundle into wheel + auditwheel repair
        env:
          SHARKTOPUS_WGRIB2_SRC: /tmp/wgrib2
        run: scripts/bundle_wgrib2.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharktopus-linux-x86_64
          path: dist/*.whl
          if-no-files-found: error

  linux-aarch64:
    name: Linux aarch64 (manylinux_2_28)
    runs-on: ubuntu-24.04-arm
    container:
      image: quay.io/pypa/manylinux_2_28_aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gfortran
        run: dnf install -y gcc-gfortran

      - name: Put CPython 3.12 on PATH
        run: echo "/opt/python/cp312-cp312/bin" >> "$GITHUB_PATH"

      - name: Install build tooling
        run: pip install --upgrade pip build auditwheel

      - name: Compile wgrib2
        run: scripts/build_wgrib2.sh /tmp/wgrib2

      - name: Bundle into wheel + auditwheel repair
        env:
          SHARKTOPUS_WGRIB2_SRC: /tmp/wgrib2
          SHARKTOPUS_MANYLINUX_PLAT: manylinux_2_28_aarch64
        run: scripts/bundle_wgrib2.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharktopus-linux-aarch64
          path: dist/*.whl
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gfortran via Homebrew
        # Homebrew's gcc formula ships versioned binaries (gcc-13,
        # gfortran-13, ...). There's no unsuffixed `gfortran` on PATH
        # after `brew install gcc`, so we derive both CC and FC by
        # globbing the versioned names. We force CC to the Homebrew gcc
        # so wgrib2's C sources don't hit Apple's Clang-as-gcc.
        run: |
          brew update-reset >/dev/null
          brew install gcc
          echo "BREW_GCC=$(ls /opt/homebrew/bin/gcc-* | grep -E 'gcc-[0-9]+$' | head -1)" >> "$GITHUB_ENV"
          echo "BREW_FC=$(ls /opt/homebrew/bin/gfortran-* | grep -E 'gfortran-[0-9]+$' | head -1)" >> "$GITHUB_ENV"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install --upgrade pip build delocate

      - name: Compile wgrib2
        run: |
          export CC="$BREW_GCC"
          export FC="$BREW_FC"
          scripts/build_wgrib2.sh /tmp/wgrib2

      - name: Bundle wheel
        env:
          SHARKTOPUS_WGRIB2_SRC: /tmp/wgrib2
        run: scripts/bundle_wgrib2.sh

      - name: delocate-wheel (vendor libgfortran/libgomp)
        run: |
          mkdir -p dist/repaired
          delocate-wheel -v -w dist/repaired --require-archs arm64 dist/sharktopus-*.whl
          rm -f dist/sharktopus-*macosx_*.whl dist/sharktopus-*-py3-none-any.whl
          mv dist/repaired/*.whl dist/
          rmdir dist/repaired
          ls -l dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharktopus-macos-arm64
          path: dist/*.whl
          if-no-files-found: error

  macos-x86_64:
    name: macOS x86_64 (Intel)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gfortran via Homebrew
        run: |
          brew update-reset >/dev/null
          brew install gcc
          # Intel Homebrew lives under /usr/local, not /opt/homebrew.
          # Homebrew's gcc formula only ships versioned binaries, so we
          # derive both CC and FC from the gcc-N / gfortran-N pair.
          echo "BREW_GCC=$(ls /usr/local/bin/gcc-* | grep -E 'gcc-[0-9]+$' | head -1)" >> "$GITHUB_ENV"
          echo "BREW_FC=$(ls /usr/local/bin/gfortran-* | grep -E 'gfortran-[0-9]+$' | head -1)" >> "$GITHUB_ENV"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install --upgrade pip build delocate

      - name: Compile wgrib2
        run: |
          export CC="$BREW_GCC"
          export FC="$BREW_FC"
          scripts/build_wgrib2.sh /tmp/wgrib2

      - name: Bundle wheel
        env:
          SHARKTOPUS_WGRIB2_SRC: /tmp/wgrib2
        run: scripts/bundle_wgrib2.sh

      - name: delocate-wheel (vendor libgfortran/libgomp)
        run: |
          mkdir -p dist/repaired
          delocate-wheel -v -w dist/repaired --require-archs x86_64 dist/sharktopus-*.whl
          rm -f dist/sharktopus-*macosx_*.whl dist/sharktopus-*-py3-none-any.whl
          mv dist/repaired/*.whl dist/
          rmdir dist/repaired
          ls -l dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharktopus-macos-x86_64
          path: dist/*.whl
          if-no-files-found: error

  publish-testpypi:
    # Auto-publish release candidates (v*rc*) to TestPyPI so end-to-end
    # install validation (pip install --pre sharktopus from
    # test.pypi.org) doesn't require a manual twine upload. The
    # production index is untouched — that publish stays manual.
    name: Publish to TestPyPI
    needs: [linux-x86_64, linux-aarch64, macos-arm64, macos-x86_64]
    if: contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -l dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          skip-existing: true
