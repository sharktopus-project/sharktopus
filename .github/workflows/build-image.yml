name: Build and publish container image

# Builds the Lambda/Cloud Run container image (wgrib2 + handler) and
# publishes it to the public GitHub Container Registry under
#   ghcr.io/sharktopus-project/sharktopus
#
# Why: end users running `sharktopus deploy aws|gcloud|azure` should not
# need Docker on their machine. `provision.py` pulls this prebuilt image
# from the public registry and mirrors it into the user's ECR / Artifact
# Registry / ACR. The image is public; authentication is only needed to
# push (handled here via the job's GITHUB_TOKEN).
#
# Tags published:
#   - :latest            (on push to main)
#   - :sha-<short>       (on push to main)
#   - :<ref>             (on git tag v*, e.g. v0.1.0)
#   - :<major>.<minor>   (on git tag v*, e.g. 0.1)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sharktopus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: deploy/aws
          file: deploy/aws/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
